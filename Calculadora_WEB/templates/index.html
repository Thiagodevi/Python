<!DOCTYPE html>
<html>
<head>
    <title>Calculadora Python</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        .calculadora {
            display: inline-block;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }
        input, select, button {
            margin: 10px;
            padding: 8px;
        }
        .resultado {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="calculadora">
        <h2>Calculadora</h2>
        <form method="POST">
            <input type="number" step="any" name="num1" placeholder="Primeiro número" required><br>
            
            <select name="operacao">
                <option value="soma">+</option>
                <option value="subtracao">-</option>
                <option value="multiplicacao">*</option>
                <option value="divisao">/</option>
            </select><br>

            <input type="number" step="any" name="num2" placeholder="Segundo número" required><br>
            
            <button type="submit">Calcular</button>
        </form>

        {% if resultado is not none %}
            <div class="resultado">
                Resultado: {{ resultado }}
            </div>
        {% endif %}
    </div>

</body>
</html>
