<!DOCTYPE html>
<html>
<head>
    <title>Perfil - {{ funcionario.nome }}</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1f4037, #99f2c8);
            text-align: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            width: 450px;
            max-width: 90%;
            margin: 60px auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .foto {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
        }

        h1 {
            margin-top: 15px;
            font-size: 2rem;
        }

        .cargo {
            color: gray;
            font-weight: bold;
            font-size: 1rem;
        }

        .descricao {
            margin-top: 20px;
            font-size: 1rem;
            line-height: 1.6;
            color: #444;
        }

        .voltar {
            display: inline-block;
            margin-top: 25px;
            padding: 10px 20px;
            background: #2c5364;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .voltar:hover {
            background: #203a43;
        }

        /* Responsivo */
        @media (max-width: 480px) {
            .card {
                width: 95%;
                padding: 20px;
            }
            h1 {
                font-size: 1.5rem;
            }
            .foto {
                width: 120px;
                height: 120px;
            }
            .descricao {
                font-size: 0.9rem;
            }
        }

    </style>
</head>
<body>

    <div class="card">
        <img class="foto" src="{{ url_for('static', filename='fotos/' + funcionario.foto) }}">
        <h1>{{ funcionario.nome }}</h1>
        <p class="cargo">{{ funcionario.cargo }}</p>
        <p class="descricao">{{ funcionario.descricao }}</p>
        <a class="voltar" href="/">Voltar</a>
    </div>

</body>
</html>
