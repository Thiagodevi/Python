<!DOCTYPE html>
<html>
<head>
    <title>Webdutos - Suporte N1</title>
    <style>
        /* Reset e fonte */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
            min-height: 100vh;
        }

        h1 {
            padding-top: 40px;
            font-size: 3rem;
        }

        /* Seção do setor */
        .setor {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            font-size: 1rem;
            line-height: 1.6;
        }

        /* Container dos cards */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 40px auto;
            gap: 20px;
            padding: 0 10px;
        }

        /* Card de funcionário */
        .card {
            background: white;
            color: #333;
            width: 250px;
            border-radius: 15px;
            padding: 20px;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: 0.3s;
            flex: 1 1 250px;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .foto {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
        }

        .cargo {
            color: #555;
            font-size: 0.9rem;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
            }
            .container {
                gap: 15px;
            }
            .card {
                width: 45%;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.8rem;
            }
            .card {
                width: 100%;
            }
            .setor {
                font-size: 0.9rem;
                padding: 15px;
            }
        }

    </style>
</head>
<body>

    <h1>Webdutos</h1>

    <div class="setor">
        <h2>Sobre o Suporte Técnico N1</h2>
        <p>{{ descricao_setor }}</p>
    </div>

    <div class="container">
        {% for key, funcionario in funcionarios.items() %}
        <a class="card" href="/perfil/{{ key }}">
            <img class="foto" src="{{ url_for('static', filename='fotos/' + funcionario.foto) }}">
            <h3>{{ funcionario.nome }}</h3>
            <p class="cargo">{{ funcionario.cargo }}</p>
        </a>
        {% endfor %}
    </div>

</body>
</html>
