<!DOCTYPE html>
<html>
<head>
    <title>Webdutos - Suporte N1</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }

        .btn {
            display: block;
            width: 250px;
            margin: 10px auto;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <h1>Webdutos</h1>
    <h2>Equipe Suporte N1</h2>

    {% for key, funcionario in funcionarios.items() %}
        <a class="btn" href="/perfil/{{ key }}">
            {{ funcionario.nome }} - {{ funcionario.cargo }}
        </a>
    {% endfor %}

</body>
</html>
